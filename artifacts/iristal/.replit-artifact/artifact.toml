kind = "web"
previewPath = "/"
title = "Iristal – Instalații Profesionale Iași"
version = "1.0.0"
id = "artifacts/iristal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23745

[services.development]
run = "pnpm --filter @workspace/iristal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iristal", "run", "build" ]
publicDir = "artifacts/iristal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23745"
BASE_PATH = "/"
